name: Diagnose iOS Build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  diagnose:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: 📁 Step 1 - Before removing ios
        run: |
          echo "Содержимое корня проекта:"
          ls -la
          echo ""
          echo "Папка ios существует? $(if [ -d ios ]; then echo "✅ ДА"; else echo "❌ НЕТ"; fi)"
          if [ -d ios ]; then
            echo "Содержимое ios:"
            ls -la ios/
          fi

      - name: 🗑️ Step 2 - Remove ios folder
        run: rm -rf ios

      - name: ✅ Step 3 - After removal
        run: |
          echo "Папка ios после удаления: $(if [ -d ios ]; then echo "❓ ЕЩЕ ЕСТЬ"; else echo "✅ УДАЛЕНА"; fi)"

      - name: 📦 Step 4 - Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: ℹ️ Step 5 - Check Capacitor version
        run: npx cap --version

      - name: ➕ Step 6 - Add iOS platform
        run: npx cap add ios
        continue-on-error: true

      - name: 🔍 Step 7 - After cap add ios
        run: |
          echo "РЕЗУЛЬТАТ КОМАНДЫ cap add ios:"
          echo "Папка ios существует? $(if [ -d ios ]; then echo "✅ ДА"; else echo "❌ НЕТ"; fi)"
          if [ -d ios ]; then
            echo "Содержимое папки ios (первый уровень):"
            ls -la ios/
            echo ""
            echo "Содержимое папки ios/App (если есть):"
            if [ -d ios/App ]; then
              ls -la ios/App/
            else
              echo "❌ Папка ios/App НЕ создана"
            fi
            echo ""
            echo "Поиск файлов .xcworkspace:"
            find ios -name "*.xcworkspace" -type d || echo "❌ .xcworkspace не найден"
          fi

      - name: 🔄 Step 8 - Sync Capacitor
        run: npx cap sync ios
        continue-on-error: true

      - name: 🔍 Step 9 - After cap sync
        run: |
          echo "РЕЗУЛЬТАТ ПОСЛЕ cap sync ios:"
          if [ -d ios/App ]; then
            echo "Содержимое ios/App:"
            ls -la ios/App/
            echo ""
            echo "Повторный поиск .xcworkspace:"
            find ios -name "*.xcworkspace" -type d || echo "❌ .xcworkspace всё еще не найден"
          else
            echo "❌ Папка ios/App так и не создалась"
          fi

      - name: 🛠️ Step 10 - Try manual workspace creation (fallback)
        run: |
          echo "Пробуем создать проект вручную..."
          mkdir -p ios/App
          cd ios/App
          cat > Podfile << 'EOF'
          platform :ios, '14.0'
          target 'App' do
            use_frameworks! :linkage => :static
          end
          EOF
          pod init 2>/dev/null || true
          pod install 2>/dev/null || true
          cd ../..
          echo "Готово."

      - name: 📤 Final Step - Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-logs
          path: |
            ./*
            ./ios/**
          if-no-files-found: warn
