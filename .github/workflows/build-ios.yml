name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create www folder
        run: mkdir -p www

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -archivePath ${{ runner.temp }}/App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p ${{ runner.temp }}/ipa
          xcodebuild -exportArchive \
                     -archivePath ${{ runner.temp }}/App.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath ${{ runner.temp }}/ipa \
                     -allowProvisioningUpdates \
                     CODE_SIGNING_ALLOWED=NO || \
          echo "Export failed, but we'll try to find the .app bundle"

      - name: Find and save .app bundle (fallback)
        run: |
          find ${{ runner.temp }} -name "*.app" -type d || true
          find ${{ runner.temp }} -name "*.ipa" -type f || true
          # Если нашли .app, можно заархивировать его как IPA
          APP_PATH=$(find ${{ runner.temp }} -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r ${{ runner.temp }}/ipa/fallback.ipa "$(basename "$APP_PATH")"
            echo "Created fallback IPA from .app bundle"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: |
            ${{ runner.temp }}/ipa/*.ipa
            ${{ runner.temp }}/*.ipa
            ${{ runner.temp }}/**/*.ipa
          if-no-files-found: warn

      - name: Upload xcarchive as fallback
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-xcarchive
          path: ${{ runner.temp }}/App.xcarchive
