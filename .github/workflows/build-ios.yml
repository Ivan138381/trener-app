name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create www folder
        run: mkdir -p www

      - name: 📁 Check iOS folder structure
        run: |
          echo "=== Содержимое папки ios ==="
          ls -la ios/ || echo "Папка ios не существует"
          echo ""
          echo "=== Содержимое папки ios/App ==="
          ls -la ios/App/ || echo "Папка ios/App не существует"
          echo ""
          echo "=== Поиск .xcworkspace файлов ==="
          find ios -name "*.xcworkspace" -type d || echo "Файлы .xcworkspace не найдены"

      - name: Remove existing iOS folder
        run: rm -rf ios

      - name: Add iOS platform
        run: npx cap add ios

      - name: Verify workspace was created
        run: |
          echo "=== Проверка создания workspace ==="
          ls -la ios/App/
          if [ -f "ios/App/App.xcworkspace" ]; then
            echo "✅ App.xcworkspace создан успешно"
          else
            echo "❌ App.xcworkspace НЕ создан"
            exit 1
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -archivePath ${{ runner.temp }}/App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO

      - name: Create IPA directory
        run: mkdir -p ${{ runner.temp }}/ipa

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath ${{ runner.temp }}/App.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath ${{ runner.temp }}/ipa \
                     -allowProvisioningUpdates \
                     CODE_SIGNING_ALLOWED=NO || \
          echo "Export failed, but continuing"

      - name: Find and save any IPA or app bundle
        run: |
          find ${{ runner.temp }} -name "*.ipa" -type f || true
          find ${{ runner.temp }} -name "*.app" -type d || true
          # Если нашли .app, запакуем его
          APP_PATH=$(find ${{ runner.temp }} -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r ${{ runner.temp }}/ipa/app_bundle.zip "$(basename "$APP_PATH")"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: |
            ${{ runner.temp }}/ipa/*.ipa
            ${{ runner.temp }}/ipa/*.zip
            ${{ runner.temp }}/*.ipa
          if-no-files-found: warn

      - name: Upload xcarchive as backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-xcarchive
          path: ${{ runner.temp }}/App.xcarchive
