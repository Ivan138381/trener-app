name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install @capacitor/assets
        run: npm install -g @capacitor/assets

      - name: Create www folder
        run: |
          mkdir -p www
          cp index.html www/ || echo "index.html not found, skipping copy"

      - name: Install iOS pod dependencies
        run: |
          cd ios/App || exit 0
          pod install || echo "Pod install skipped"
          cd ../..

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build iOS app
        run: |
          npx cap copy ios
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -archivePath ${{ runner.temp }}/App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO || \
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Release \
                     -archivePath ${{ runner.temp }}/App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath ${{ runner.temp }}/App.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath ${{ runner.temp }}/ipa \
                     -allowProvisioningUpdates || \
          echo "Export failed but continuing"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: warn
