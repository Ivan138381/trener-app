name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Create www folder
        run: mkdir -p www

      - name: Copy index.html to www
        run: cp index.html www/ || echo "index.html not found"

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Remove existing iOS folder
        run: rm -rf ios

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS app (using .xcodeproj)
        run: |
          cd ios/App
          # Используем -project вместо -workspace
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     build

      - name: Find and package .app as IPA
        run: |
          # Ищем .app файл в стандартной папке сборки
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "✅ Найден .app файл: $APP_PATH"
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r app.ipa Payload
            echo "✅ IPA создан: app.ipa"
          else
            echo "❌ .app файл не найден!"
            # Пробуем найти в другом месте
            find /Users/runner -name "*.app" -type d || true
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned
          path: app.ipa
          retention-days: 30

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.log
